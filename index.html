document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];

{margin:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;background:#FBFAF7;}\n  ::selection{background:rgba(46,139,94,.22);}\n  details > summary{list-style:none;cursor:pointer;}\n  details > summary::-webkit-details-marker{display:none;}\n  details[open] .faq-plus{transform:rotate(45deg);}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"font-family:'Plus Jakarta Sans',sans-serif;color:#1A2420;background:#FBFAF7;\">\n\n  <!-- NAV -->\n  <nav style=\"position:sticky;top:0;z-index:50;background:rgba(251,250,247,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(31,77,61,.08);\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <div style=\"width:32px;height:32px;border-radius:9px;background:#1F4D3D;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;\">A<\u002Fdiv>\n        <span style=\"font-size:19px;font-weight:800;letter-spacing:-.02em;color:#1F4D3D;\">Arth Path<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:28px;\">\n        <a href=\"#services\" style=\"color:#4A554F;text-decoration:none;font-size:14.5px;font-weight:600;\">The Framework<\u002Fa>\n        <a href=\"#about\" style=\"color:#4A554F;text-decoration:none;font-size:14.5px;font-weight:600;\">About<\u002Fa>\n        <a href=\"#how\" style=\"color:#4A554F;text-decoration:none;font-size:14.5px;font-weight:600;\">How It Works<\u002Fa>\n        <a href=\"#faq\" style=\"color:#4A554F;text-decoration:none;font-size:14.5px;font-weight:600;\">FAQs<\u002Fa>\n        <button style=\"background:#1F4D3D;color:#fff;border:none;padding:11px 22px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;\">Schedule a Call<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section style=\"max-width:880px;margin:0 auto;padding:100px 32px 60px;text-align:center;\">\n    <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(46,139,94,.1);color:#256B4C;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:28px;\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:#2E8B5E;\"><\u002Fspan>Independent · Holistic Financial Strategy\n    <\u002Fdiv>\n    <h1 style=\"font-size:60px;font-weight:800;line-height:1.06;letter-spacing:-.035em;margin:0 0 24px;color:#16201C;text-wrap:balance;\">A complete financial strategy, built around your family.<\u002Fh1>\n    <p style=\"font-size:19px;line-height:1.65;color:#4A554F;max-width:610px;margin:0 auto 36px;\">From protecting what you've built to growing it and planning what it's all for — one independent strategist who looks at your entire picture, not a single product.<\u002Fp>\n    <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;\">\n      <button style=\"background:#1F4D3D;color:#fff;border:none;padding:16px 30px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;\">Schedule a Consultation<\u002Fbutton>\n      <a href=\"#services\" style=\"display:inline-flex;align-items:center;padding:16px 30px;border:1.5px solid rgba(31,77,61,.2);border-radius:999px;color:#1F4D3D;text-decoration:none;font-size:15px;font-weight:700;background:#fff;\">Explore the Framework<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"font-size:13.5px;color:#7A857F;font-weight:600;margin:0;\">Independent strategist · No pressure · Your whole picture<\u002Fp>\n  <\u002Fsection>\n\n  <!-- THE FRAMEWORK -->\n  <section id=\"services\" style=\"max-width:1140px;margin:0 auto;padding:40px 32px 96px;scroll-margin-top:84px;\">\n    <div style=\"text-align:center;max-width:640px;margin:0 auto 48px;\">\n      <div style=\"color:#256B4C;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;\">The Framework<\u002Fdiv>\n      <h2 style=\"font-size:40px;font-weight:800;line-height:1.1;letter-spacing:-.028em;margin:0 0 16px;color:#16201C;text-wrap:balance;\">Your whole picture, planned in five parts.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;color:#5A655F;margin:0;\">Real planning isn't a single product. It starts with where you are, stands on a solid cash-flow foundation, protects what you've built, grows it, and ties every number back to the life you want.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:18px;\">\n\n      <!-- 01 SNAPSHOT -->\n      <div style=\"background:#fff;border:1px solid rgba(31,77,61,.08);border-radius:24px;padding:40px;box-shadow:0 1px 3px rgba(26,36,32,.04);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;\" style-hover=\"border-color:#2E8B5E;box-shadow:0 18px 44px rgba(31,77,61,.15);transform:translateY(-5px);\">\n        <div style=\"display:grid;grid-template-columns:.82fr 1.18fr;gap:44px;align-items:start;\">\n          <div>\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:14px;\"><span style=\"font-size:15px;font-weight:800;color:#2E8B5E;letter-spacing:.04em;\">01<\u002Fspan><span style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9AA39C;\">The Starting Point<\u002Fspan><\u002Fdiv>\n            <h3 style=\"font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 12px;color:#16201C;\">Financial Snapshot<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.65;color:#5A655F;margin:0;\">A clear baseline before any planning begins — a quick read on where life stands today.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;\">\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Family Picture<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Marital status, dependents and their ages.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Income Overview<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">A high-level look at what comes in each month.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Current Savings<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Retirement and college balances, and how far along you are.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Quick Health Check<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">The essentials, before the detailed work starts.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 02 CASH FLOW -->\n      <div style=\"background:#fff;border:1px solid rgba(31,77,61,.08);border-radius:24px;padding:40px;box-shadow:0 1px 3px rgba(26,36,32,.04);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;\" style-hover=\"border-color:#2E8B5E;box-shadow:0 18px 44px rgba(31,77,61,.15);transform:translateY(-5px);\">\n        <div style=\"display:grid;grid-template-columns:.82fr 1.18fr;gap:44px;align-items:start;\">\n          <div>\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:14px;\"><span style=\"font-size:15px;font-weight:800;color:#2E8B5E;letter-spacing:.04em;\">02<\u002Fspan><span style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9AA39C;\">The Foundation<\u002Fspan><\u002Fdiv>\n            <h3 style=\"font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 12px;color:#16201C;\">Cash Flow<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.65;color:#5A655F;margin:0;\">Savings versus spending — the foundation everything else is built on.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;\">\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Income Analysis<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Salary, bonuses and equity like RSUs and ESPP, for you and your spouse.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Tax Planning<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Federal, state, FICA and Medicare — and where Roth or Traditional fits best.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Budget Planning<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Housing, lifestyle, short-term goals and ongoing contributions.<\u002Fspan><\u002Fdiv>\n            <div><strong style=\"display:block;font-size:14.5px;font-weight:700;color:#16201C;margin-bottom:3px;\">Debt Strategy<\u002Fstrong><span style=\"font-size:13.5px;line-height:1.5;color:#5A655F;\">Loans and balances, with a repayment approach that frees up room to save.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 03 PROTECTION -->\n      <div style=\"background:#fff;border:1px solid rgba(31,77,61,.08);border-radius:24px;padding:40px;box-shadow:0 1px 3px rgba(26,36,32,.04);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;\" style-hover=\"border-color:#2E8B5E;box-shadow:0 18px 44px rgba(31,77,61,.15);transform:translateY(-5px);\">\n        <div style=\"display:grid;grid-template-columns:.82fr 1.18fr; ails style=\"background:#fff;border:1px solid rgba(31,77,61,.1);border-radius:16px;padding:0 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0;font-size:16.5px;font-weight:700;color:#16201C;\">Do I need to have everything figured out first?<span class=\"faq-plus\" style=\"flex:none;color:#2E8B5E;font-size:24px;font-weight:400;transition:transform .2s;line-height:1;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"font-size:15px;line-height:1.7;color:#5A655F;margin:0 0 22px;\">Not at all. We start with a simple snapshot of where you are and build from there. Most people come in with more questions than answers — that's exactly the point of the first conversation.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border:1px solid rgba(31,77,61,.1);border-radius:16px;padding:0 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0;font-size:16.5px;font-weight:700;color:#16201C;\">What does \"independent\" actually mean?<span class=\"faq-plus\" style=\"flex:none;color:#2E8B5E;font-size:24px;font-weight:400;transition:transform .2s;line-height:1;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"font-size:15px;line-height:1.7;color:#5A655F;margin:0 0 22px;\">I'm not tied to any single company. I can compare options side by side and recommend what fits your situation — not whatever one company happens to offer.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border:1px solid rgba(31,77,61,.1);border-radius:16px;padding:0 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0;font-size:16.5px;font-weight:700;color:#16201C;\">Do you give investment or tax advice?<span class=\"faq-plus\" style=\"flex:none;color:#2E8B5E;font-size:24px;font-weight:400;transition:transform .2s;line-height:1;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"font-size:15px;line-height:1.7;color:#5A655F;margin:0 0 22px;\">Nothing here is investment, legal or tax advice. I coordinate the planning across your whole picture and work alongside your CPA or attorney rather than replacing them.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:#fff;border:1px solid rgba(31,77,61,.1);border-radius:16px;padding:0 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0;font-size:16.5px;font-weight:700;color:#16201C;\">What happens after our first conversation?<span class=\"faq-plus\" style=\"flex:none;color:#2E8B5E;font-size:24px;font-weight:400;transition:transform .2s;line-height:1;\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"font-size:15px;line-height:1.7;color:#5A655F;margin:0 0 22px;\">I put together a clear picture across all five parts of the framework, walk you through the options, and handle the legwork on anything you choose to move forward with — then check in as life changes.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- CTA -->\n  <section style=\"max-width:1140px;margin:0 auto;padding:20px 32px 96px;\">\n    <div style=\"background:linear-gradient(150deg,#2E6B53,#163A2C);border-radius:28px;padding:72px 48px;text-align:center;\">\n      <h2 style=\"font-size:42px;font-weight:800;line-height:1.1;letter-spacing:-.03em;color:#fff;margin:0 auto 16px;max-width:640px;text-wrap:balance;\">Bring me your situation. I'll bring you the full picture.<\u002Fh2>\n      <p style=\"font-size:17.5px;color:rgba(255,255,255,.78);margin:0 0 32px;\">A first conversation comes with no pressure and no obligation.<\u002Fp>\n      <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;\">\n        <button style=\"background:#fff;color:#1F4D3D;border:none;padding:16px 32px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointe
